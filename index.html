<!DOCTYPE html>
<html lang="ar" dir="rtl" class="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pavilion Glass Commerce</title>
    <link rel="icon" type="image/png" href="/fav.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Inter:wght@400;600;700&display=swap" />
    <script>
      (function() {
        const theme = localStorage.getItem('theme') || 'light';
        document.documentElement.classList.add(theme);
        if (theme === 'dark') {
          document.documentElement.classList.remove('light');
        }
      })();
    </script>
  </head>
  <body class="bg-[#f7f7fa] dark:bg-[#0a051a]">
    <div id="root"></div>
    <script type="module" src="/src/spa-entry.tsx"></script>
  </body>
</html>
